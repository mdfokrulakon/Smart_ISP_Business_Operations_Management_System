<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Promee Internet - Add New Client</title>
    <link rel="stylesheet" href="assets/css/style.css?v=20260326f" />
    <!-- FontAwesome for Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      .password-wrap {
        position: relative;
      }

      .password-wrap input {
        padding-right: 44px;
      }

      .toggle-password-btn {
        position: absolute;
        top: 50%;
        right: 10px;
        transform: translateY(-50%);
        border: 0;
        background: transparent;
        color: #64748b;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="app-header"></div>
<!-- Main Content Area -->
    <div class="main-content">
<!-- Search Results Modal -->
      <div id="searchModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;">
        <div style="background: white; width: 90%; max-width: 1200px; margin: 5% auto; border-radius: 8px; padding: 20px; max-height: 80vh; overflow-y: auto;">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2>Search Results</h2>
            <button onclick="closeSearchModal()" style="background: #ff6b6b; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer;"><i class="fa-solid fa-times"></i> Close</button>
          </div>
          <div id="searchResults" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px;">
            <!-- Search results will be populated here -->
          </div>
        </div>
      </div>

      <!-- Page Content -->
      <div class="page-content">
        <div class="content-header">
          <h1><i class="fa-solid fa-user-plus"></i> Add New Client</h1>
          <p>Register a new client in the system</p>
        </div>

        <div class="card">
          <div class="card-header">
            <h3><i class="fa-solid fa-user-tag"></i> Client Information</h3>
          </div>
          <div class="card-body">
            <form class="client-form" id="clientForm" novalidate>
              <!-- Personal Information -->
              <div class="form-section">
                <h4><i class="fa-solid fa-user"></i> Personal Information</h4>
                <div class="form-row">
                  <div class="form-group">
                    <label for="first-name">First Name *</label>
                    <input
                      type="text"
                      id="first-name"
                      required
                      placeholder="Enter first name"
                    />
                  </div>
                  <div class="form-group">
                    <label for="last-name">Last Name *</label>
                    <input
                      type="text"
                      id="last-name"
                      required
                      placeholder="Enter last name"
                    />
                  </div>
                </div>

                <div class="form-row">
                  <div class="form-group">
                    <label for="phone">Phone Number *</label>
                    <input
                      type="tel"
                      id="phone"
                      required
                      placeholder="Enter phone number"
                    />
                  </div>
                  <div class="form-group">
                    <label for="email">Email Address</label>
                    <input
                      type="email"
                      id="email"
                      placeholder="Enter email address"
                    />
                  </div>
                </div>

                <div class="form-row">
                  <div class="form-group">
                    <label for="nid">National ID / Passport</label>
                    <input
                      type="text"
                      id="nid"
                      placeholder="Enter NID or passport number"
                    />
                  </div>
                  <div class="form-group">
                    <label for="birth-date">Date of Birth</label>
                    <input type="date" id="birth-date" />
                  </div>
                </div>
              </div>

              <!-- Connection Settings -->
              <div class="form-section">
                <h4><i class="fa-solid fa-plug"></i> Connection Settings</h4>
                <p style="font-size: 12px; color: #6b7280; margin: 0;">Connection Type will be configured in Service Information section below.</p>
              </div>

              <!-- Address Information -->
              <div class="form-section">
                <h4>
                  <i class="fa-solid fa-location-dot"></i> Address Information
                </h4>
                <div class="form-row">
                  <div class="form-group">
                    <label for="address">Street Address *</label>
                    <input
                      type="text"
                      id="address"
                      required
                      placeholder="Enter street address"
                    />
                  </div>
                  <div class="form-group">
                    <label for="area">Area / District *</label>
                    <input
                      type="text"
                      id="area"
                      required
                      placeholder="Enter area or district"
                    />
                  </div>
                </div>

                <div class="form-row">
                  <div class="form-group">
                    <label for="city">City *</label>
                    <input
                      type="text"
                      id="city"
                      required
                      placeholder="Enter city"
                    />
                  </div>
                  <div class="form-group">
                    <label for="postal-code">Postal Code</label>
                    <input
                      type="text"
                      id="postal-code"
                      placeholder="Enter postal code"
                    />
                  </div>
                </div>
              </div>

              <!-- Service Information -->
              <div class="form-section">
                <h4><i class="fa-solid fa-wifi"></i> Service Information</h4>
                <div class="form-row">
                  <div class="form-group">
                    <label for="package">Service Package *</label>
                    <select id="package" required>
                      <option value="">Loading packages...</option>
                    </select>
                  </div>
                  <div class="form-group">
                    <label for="connection-type">Connection Type *</label>
                    <select id="connection-type" required>
                      <option value="">Select Type</option>
                      <option value="fiber">Fiber Optic</option>
                      <option value="wireless">Wireless</option>
                      <option value="copper">Copper</option>
                    </select>
                  </div>
                </div>

                <div class="form-row">
                  <div class="form-group">
                    <label for="installation-date">Installation Date *</label>
                    <input type="date" id="installation-date" required />
                  </div>
                  <div class="form-group">
                    <label for="monthly-billing">Monthly Billing Date *</label>
                    <select id="monthly-billing" required>
                      <option value="">Select Date</option>
                      <option value="1">1st of month</option>
                      <option value="5">5th of month</option>
                      <option value="10">10th of month</option>
                      <option value="15">15th of month</option>
                      <option value="20">20th of month</option>
                      <option value="25">25th of month</option>
                    </select>
                  </div>
                </div>
              </div>

              <!-- Technical Information -->
              <div class="form-section">
                <h4>
                  <i class="fa-solid fa-network-wired"></i> Technical
                  Information
                </h4>
                <div class="form-row">
                  <div class="form-group">
                    <label for="username">Connection Username *</label>
                    <input
                      type="text"
                      id="username"
                      required
                      placeholder="Enter username"
                    />
                  </div>
                  <div class="form-group">
                    <label for="connection-mail">Connection Mail *</label>
                    <input
                      type="email"
                      id="connection-mail"
                      readonly
                      placeholder="username@client.promee.internet"
                    />
                  </div>
                </div>

                <div class="form-row">
                  <div class="form-group">
                    <label for="connection-password">Connection Password *</label>
                    <div class="password-wrap">
                      <input
                        type="password"
                        id="connection-password"
                        required
                        placeholder="Enter password"
                      />
                      <button type="button" class="toggle-password-btn" id="toggleConnectionPassword" aria-label="Show password">
                        <i class="fa-solid fa-eye"></i>
                      </button>
                    </div>
                  </div>
                </div>

                <div class="form-row">
                  <div class="form-group">
                    <label for="onu-mac">ONU MAC Address</label>
                    <input
                      type="text"
                      id="onu-mac"
                      placeholder="Enter ONU MAC address"
                    />
                  </div>
                  <div class="form-group">
                    <label for="router-ip">Router IP Address</label>
                    <input
                      type="text"
                      id="router-ip"
                      placeholder="192.168.1.1"
                    />
                  </div>
                </div>
              </div>

              <!-- Additional Information -->
              <div class="form-section">
                <h4>
                  <i class="fa-solid fa-circle-info"></i> Additional Information
                </h4>
                <div class="form-row">
                  <div class="form-group">
                    <label for="referral">Referred By</label>
                    <input
                      type="text"
                      id="referral"
                      placeholder="Enter referral name if any"
                    />
                  </div>
                  <div class="form-group">
                    <label for="emergency-contact">Emergency Contact</label>
                    <input
                      type="text"
                      id="emergency-contact"
                      placeholder="Enter emergency contact number"
                    />
                  </div>
                </div>

                <div class="form-group">
                  <label for="notes">Notes</label>
                  <textarea
                    id="notes"
                    rows="3"
                    placeholder="Additional notes about the client..."
                  ></textarea>
                </div>
              </div>

              <div class="form-actions">
                <p id="clientFormMessage" style="width: 100%; margin-bottom: 10px; font-size: 14px;"></p>
                <button type="submit" class="btn btn-navy">
                  <i class="fa-solid fa-save"></i> Save Client
                </button>
                <button type="reset" class="btn btn-navy">
                  <i class="fa-solid fa-undo"></i> Clear Form
                </button>
                <button type="button" class="btn btn-navy" id="printClientFormBtn">
                  <i class="fa-solid fa-print"></i> Print Form
                </button>
                <button type="button" class="btn btn-navy" id="downloadClientPdfBtn">
                  <i class="fa-solid fa-file-pdf"></i> Download PDF
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="assets/js/header-loader.js?v=20260328i"></script>
    <script>
      (async function () {
        const form = document.getElementById('clientForm');
        const message = document.getElementById('clientFormMessage');
        const printClientFormBtn = document.getElementById('printClientFormBtn');
        const downloadClientPdfBtn = document.getElementById('downloadClientPdfBtn');
        const connectionPasswordInput = document.getElementById('connection-password');
        const toggleConnectionPassword = document.getElementById('toggleConnectionPassword');
        const packageSelect = document.getElementById('package');

        function setMessage(text, isError) {
          message.textContent = text;
          message.style.color = isError ? '#dc2626' : '#15803d';
        }

        async function ensureAuth() {
          try {
            const res = await fetch('backend/public/auth/me.php', {
              credentials: 'same-origin'
            });
            if (!res.ok) {
              window.location.href = 'login.html';
              return false;
            }
            return true;
          } catch (error) {
            window.location.href = 'login.html';
            return false;
          }
        }

        const isLoggedIn = await ensureAuth();
        if (!isLoggedIn) {
          return;
        }

          async function loadPackages() {
            packageSelect.disabled = true;
            packageSelect.innerHTML = '<option value="">Loading packages...</option>';

            try {
              const response = await fetch('backend/public/clients/packages.php?_=' + Date.now(), {
                method: 'GET',
                credentials: 'same-origin',
                cache: 'no-store'
              });
              const result = await response.json().catch(() => null);

              if (!response.ok || !result || result.ok === false) {
                packageSelect.innerHTML = '<option value="">Unable to load packages</option>';
                return;
              }

              const packages = Array.isArray(result.packages) ? result.packages : [];
              packageSelect.innerHTML = '<option value="">Select Package</option>';

              if (!packages.length) {
                packageSelect.innerHTML = '<option value="">No active package found</option>';
                return;
              }

              packages.forEach((pkg) => {
                if (!pkg || !pkg.package_slug) {
                  return;
                }
                const option = document.createElement('option');
                option.value = String(pkg.package_slug);
                const price = Number(pkg.monthly_price || 0);
                const label = pkg.package_label || pkg.package_name || pkg.package_slug;
                option.textContent = `${label} - ${price.toFixed(2)} BDT/month`;
                packageSelect.appendChild(option);
              });

              packageSelect.disabled = false;
            } catch (_error) {
              packageSelect.innerHTML = '<option value="">Unable to load packages</option>';
            }
          }

          await loadPackages();

          const usernameInput = document.getElementById('username');
          const connectionMailInput = document.getElementById('connection-mail');

          function updateConnectionMail() {
            const raw = usernameInput.value.trim().toLowerCase();
            const normalized = raw.replace(/[^a-z0-9._-]/g, '');
            connectionMailInput.value = normalized ? normalized + '@client.promee.internet' : '';
          }

          usernameInput.addEventListener('input', updateConnectionMail);

          toggleConnectionPassword.addEventListener('click', function () {
            const isPassword = connectionPasswordInput.type === 'password';
            connectionPasswordInput.type = isPassword ? 'text' : 'password';
            toggleConnectionPassword.innerHTML = isPassword
              ? '<i class="fa-solid fa-eye-slash"></i>'
              : '<i class="fa-solid fa-eye"></i>';
            toggleConnectionPassword.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
          });

          printClientFormBtn.addEventListener('click', function () {
            window.print();
          });

          downloadClientPdfBtn.addEventListener('click', function () {
            if (!window.jspdf || !window.jspdf.jsPDF) {
              setMessage('PDF library failed to load. Please try again.', true);
              return;
            }

            const jsPDF = window.jspdf.jsPDF;
            const doc = new jsPDF();

            const entries = [
              ['First Name', document.getElementById('first-name').value.trim()],
              ['Last Name', document.getElementById('last-name').value.trim()],
              ['Phone', document.getElementById('phone').value.trim()],
              ['Email Address', document.getElementById('email').value.trim()],
              ['Address', document.getElementById('address').value.trim()],
              ['Area / District', document.getElementById('area').value.trim()],
              ['City', document.getElementById('city').value.trim()],
              ['Postal Code', document.getElementById('postal-code').value.trim()],
              ['Service Package', document.getElementById('package').selectedOptions[0]?.textContent || document.getElementById('package').value],
              ['Installation Date', document.getElementById('installation-date').value],
              ['Connection Username', document.getElementById('username').value.trim()],
              ['Connection Mail', document.getElementById('connection-mail').value.trim()],
              ['Connection Password', document.getElementById('connection-password').value],
              ['ONU MAC Address', document.getElementById('onu-mac').value.trim()],
              ['Router IP Address', document.getElementById('router-ip').value.trim()],
              ['Referred By', document.getElementById('referral').value.trim()],
              ['Emergency Contact', document.getElementById('emergency-contact').value.trim()],
              ['Notes', document.getElementById('notes').value.trim()]
            ];

            doc.setFont('helvetica', 'bold');
            doc.setFontSize(16);
            doc.text('Promee Internet - Client Form', 14, 16);
            doc.setFont('helvetica', 'normal');
            doc.setFontSize(10);
            doc.text('Generated: ' + new Date().toLocaleString(), 14, 22);

            let y = 32;
            entries.forEach(function (entry) {
              const label = entry[0] + ':';
              const value = entry[1] || '-';

              if (y > 275) {
                doc.addPage();
                y = 16;
              }

              doc.setFont('helvetica', 'bold');
              doc.text(label, 14, y);
              doc.setFont('helvetica', 'normal');
              const wrapped = doc.splitTextToSize(value, 130);
              doc.text(wrapped, 70, y);
              y += Math.max(8, wrapped.length * 6);
            });

            const clientName = [
              document.getElementById('first-name').value.trim(),
              document.getElementById('last-name').value.trim()
            ].join(' ').trim() || 'client-form';

            const safeFile = clientName.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
            doc.save((safeFile || 'client-form') + '.pdf');
          });

        form.addEventListener('submit', async function (event) {
          event.preventDefault();

          const payload = {
            first_name: document.getElementById('first-name').value.trim(),
            last_name: document.getElementById('last-name').value.trim(),
            phone: document.getElementById('phone').value.trim(),
            email: document.getElementById('email').value.trim(),
            nid: document.getElementById('nid').value.trim(),
            birth_date: document.getElementById('birth-date').value,
            address: document.getElementById('address').value.trim(),
            area: document.getElementById('area').value.trim(),
            city: document.getElementById('city').value.trim(),
            postal_code: document.getElementById('postal-code').value.trim(),
            connection_type: document.getElementById('connection-type').value,
            onu_mac: document.getElementById('onu-mac').value.trim(),
            router_ip: document.getElementById('router-ip').value.trim(),
            package_slug: document.getElementById('package').value,
            installation_date: document.getElementById('installation-date').value,
            connection_type: document.getElementById('connection-type').value,
            payment_cycle_date: document.getElementById('monthly-billing').value,
            connection_username: document.getElementById('username').value.trim(),
            connection_email: document.getElementById('connection-mail').value.trim(),
            connection_password: document.getElementById('connection-password').value,
            referral_name: document.getElementById('referral').value.trim(),
            emergency_contact: document.getElementById('emergency-contact').value.trim(),
            notes: document.getElementById('notes').value.trim()
          };

          const requiredKeys = [
            'first_name',
            'last_name',
            'phone',
            'address',
            'area',
            'city',
            'package_slug',
            'installation_date',
            'connection_username',
            'connection_email',
            'connection_password'
          ];

          const missing = requiredKeys.some(function (key) {
            return !payload[key];
          });

          if (missing) {
            setMessage('Please fill all required fields before submitting.', true);
            return;
          }

          setMessage('Saving client...', false);

          try {
            const response = await fetch('backend/public/clients/create.php', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              credentials: 'same-origin',
              body: JSON.stringify(payload)
            });

            const result = await response.json();

            if (!response.ok || !result.ok) {
              setMessage(result.message || 'Failed to save client.', true);
              return;
            }

            setMessage('Client created successfully: ' + result.client.client_code, false);
            form.reset();
          } catch (error) {
            setMessage('Server connection failed. Please try again.', true);
          }
        });
      })();
    </script>
  </body>
</html>
