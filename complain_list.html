<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Promee Internet - Complain List</title>
    <link rel="stylesheet" href="assets/css/style.css?v=20260326f" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      .complain-table td {
        padding: 12px 15px;
      }
      .source-badge {
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 600;
      }
      .source-call {
        background: #e3f2fd;
        color: #1976d2;
      }
      .source-web {
        background: #f3e5f5;
        color: #7b1fa2;
      }
      .source-app {
        background: #e8f5e9;
        color: #388e3c;
      }
    </style>
  </head>
  <body>
    <div id="app-header"></div>
<div class="main-content">
<div class="page-content">
        <div class="content-header">
          <h1>Complain List</h1>
          <p>Global complaints registry and tracking</p>
        </div>

        <div class="card">
          <table class="complain-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Client</th>
                <th>Subject</th>
                <th>Source</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>2026-02-06</td>
                <td>Robert Fox</td>
                <td>Slow internet during peak hours</td>
                <td>
                  <span class="source-badge source-call">Phone Search</span>
                </td>
                <td><span class="status-badge pending">Open</span></td>
                <td>
                  <button class="btn btn-navy btn-sm">Take Action</button>
                </td>
              </tr>
              <tr>
                <td>2026-02-05</td>
                <td>Jane Cooper</td>
                <td>WIFI signal not reaching second floor</td>
                <td><span class="source-badge source-web">Web Portal</span></td>
                <td><span class="status-badge scheduled">In Progress</span></td>
                <td>
                  <button class="btn btn-navy btn-sm">Take Action</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
    <script src="assets/js/header-loader.js?v=20260328i"></script>
  </body>
</html>
