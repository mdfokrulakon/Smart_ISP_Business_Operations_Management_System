<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Card Payment - Promee Internet</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    :root { --brand: #0f172a; --bg: #f8fafc; --card: #ffffff; --ink: #1f2937; --muted: #6b7280; }
    * { box-sizing: border-box; font-family: Segoe UI, Arial, sans-serif; }
    body { margin: 0; background: linear-gradient(140deg, #f8fafc, #eef2ff); color: var(--ink); }
    .wrap { min-height: 100vh; display: grid; place-items: center; padding: 20px; }
    .card { width: 100%; max-width: 540px; background: var(--card); border-radius: 16px; box-shadow: 0 18px 36px rgba(15, 23, 42, 0.18); overflow: hidden; border: 1px solid #dbeafe; }
    .head { background: var(--brand); color: #fff; padding: 18px 20px; display: flex; align-items: center; gap: 10px; }
    .body { padding: 20px; display: grid; gap: 14px; }
    label { font-size: 13px; font-weight: 700; color: #374151; display: block; margin-bottom: 6px; }
    input { width: 100%; padding: 11px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 14px; }
    input[readonly] { background: #f9fafb; color: #111827; }
    .btn { width: 100%; border: none; border-radius: 10px; background: #1d4ed8; color: #fff; padding: 12px; font-weight: 700; cursor: pointer; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg { font-size: 13px; min-height: 18px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .top-link { text-align: center; margin-top: 12px; }
    .top-link a { color: #1d4ed8; text-decoration: none; font-size: 13px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="head"><i class="fa-solid fa-credit-card"></i><strong>Card Payment</strong></div>
      <div class="body">
        <div>
          <label>Current Month</label>
          <input id="billingMonth" type="text" readonly />
        </div>
        <div>
          <label>Fixed Amount (BDT)</label>
          <input id="amount" type="text" readonly />
        </div>
        <div>
          <label>Receiver Bank Account No</label>
          <input id="receiver" type="text" readonly value="123123321312" />
        </div>
        <div>
          <label>Card Holder Name</label>
          <input id="holder" type="text" placeholder="Card holder name" />
        </div>
        <div>
          <label>Card Number</label>
          <input id="cardNo" type="text" placeholder="xxxx xxxx xxxx xxxx" />
        </div>
        <div class="grid">
          <div>
            <label>Expiry</label>
            <input id="expiry" type="text" placeholder="MM/YY" />
          </div>
          <div>
            <label>CVV</label>
            <input id="cvv" type="password" placeholder="***" />
          </div>
        </div>
        <button id="payBtn" class="btn"><i class="fa-solid fa-check"></i> Pay Now</button>
        <div id="msg" class="msg"></div>
        <div class="top-link"><a href="indexClient.html">Back to Portal</a></div>
      </div>
    </div>
  </div>

  <script>
    async function fetchJson(url, options = {}) {
      const response = await fetch(url, { credentials: 'same-origin', ...options });
      const data = await response.json().catch(() => null);
      if (!response.ok || !data || data.ok === false) {
        throw new Error((data && data.message) || 'Request failed');
      }
      return data;
    }

    function setMsg(text, isError) {
      const msg = document.getElementById('msg');
      msg.textContent = text;
      msg.style.color = isError ? '#dc2626' : '#059669';
    }

    async function loadContext() {
      const data = await fetchJson('backend/public/client_portal/payment_context.php');
      document.getElementById('amount').value = String(Number(data.context.fixed_amount || 0));
      document.getElementById('billingMonth').value = data.context.current_month_label || data.context.current_month;
      document.getElementById('receiver').value = data.context.receivers && data.context.receivers.card ? data.context.receivers.card : '123123321312';
    }

    async function submitPayment() {
      const holder = document.getElementById('holder').value.trim();
      const cardNo = document.getElementById('cardNo').value.trim();
      const expiry = document.getElementById('expiry').value.trim();
      const cvv = document.getElementById('cvv').value.trim();
      if (!holder || !cardNo || !expiry || !cvv) {
        setMsg('Please fill all card fields.', true);
        return;
      }

      const payBtn = document.getElementById('payBtn');
      payBtn.disabled = true;
      setMsg('Submitting payment...', false);
      try {
        const masked = cardNo.length > 4 ? ('****' + cardNo.slice(-4)) : cardNo;
        const res = await fetchJson('backend/public/client_portal/submit_payment.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ method: 'card', payer_reference: holder + ' / ' + masked })
        });

        alert(res.message + '\nPayslip: ' + res.payment.payslip_no);
        window.location.href = 'indexClient.html#history';
      } catch (error) {
        setMsg(error.message || 'Payment failed', true);
      } finally {
        payBtn.disabled = false;
      }
    }

    document.getElementById('payBtn').addEventListener('click', submitPayment);
    loadContext().catch((e) => {
      setMsg(e.message || 'Failed to load payment context', true);
      if ((e.message || '').toLowerCase().includes('unauthorized')) {
        window.location.replace('login.html');
      }
    });
  </script>
</body>
</html>
