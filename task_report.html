<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Promee Internet - Task Reports</title>
  <link rel="stylesheet" href="assets/css/style.css?v=20260326f"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    .page-header { margin-bottom: 20px; }
    .page-header h2 { font-size: 20px; font-weight: 600; color: #1a3c5e; display: flex; align-items: center; gap: 10px; }
    .page-header p { font-size: 13px; color: #888; margin-top: 4px; margin-left: 34px; }
    .subnav { display: flex; border-bottom: 2px solid #e8ecf4; margin-bottom: 18px; }
    .subnav a {
      padding: 9px 18px; font-size: 13px; color: #777; text-decoration: none;
      border-bottom: 2px solid transparent; margin-bottom: -2px;
      display: flex; align-items: center; gap: 6px;
    }
    .subnav a.active { color: #1a3c5e; border-bottom-color: #1a3c5e; font-weight: 600; }
    .report-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-bottom: 16px; }
    .report-card {
      background: #fff; border-radius: 5px; padding: 14px;
      box-shadow: 0 1px 5px rgba(0, 0, 0, .08);
      border-top: 3px solid #1a3c5e;
    }
    .report-card .label { font-size: 12px; color: #8894a0; }
    .report-card .value { margin-top: 6px; font-size: 24px; font-weight: 700; color: #1a3c5e; }
    .mini-table { width: 100%; border-collapse: collapse; }
    .mini-table th, .mini-table td { padding: 10px; font-size: 13px; border-bottom: 1px solid #f1f1f1; text-align: left; }
    .mini-table th { background: #fafbfe; color: #687583; font-weight: 600; }
  </style>
</head>
<body>
  <div id="app-header"></div>

  <div class="page-content">
    <div class="page-header">
      <h2><i class="fa-solid fa-chart-bar"></i> Task Reports</h2>
      <p>Quick weekly performance report across operations.</p>
    </div>

    <div class="card">
      <div class="subnav">
        <a href="task_management.html"><i class="fa-solid fa-list"></i> Task List</a>
        <a href="task_category.html"><i class="fa-solid fa-tags"></i> Categories</a>
        <a href="task_assign.html"><i class="fa-solid fa-user-check"></i> Assignments</a>
        <a href="task_report.html" class="active"><i class="fa-solid fa-chart-bar"></i> Reports</a>
      </div>

      <div class="report-grid">
        <div class="report-card"><div class="label">Total Tasks</div><div class="value">43</div></div>
        <div class="report-card"><div class="label">Completed</div><div class="value">18</div></div>
        <div class="report-card"><div class="label">In Progress</div><div class="value">14</div></div>
        <div class="report-card"><div class="label">Overdue</div><div class="value">5</div></div>
      </div>

      <table class="mini-table">
        <thead>
          <tr>
            <th>Team</th>
            <th>Open</th>
            <th>Closed</th>
            <th>SLA On-Time</th>
          </tr>
        </thead>
        <tbody>
          <tr><td>NOC</td><td>11</td><td>8</td><td>92%</td></tr>
          <tr><td>Support</td><td>13</td><td>10</td><td>88%</td></tr>
          <tr><td>Field Team</td><td>7</td><td>5</td><td>81%</td></tr>
          <tr><td>Billing/Accounts</td><td>6</td><td>9</td><td>96%</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="assets/js/header-loader.js?v=20260328i"></script>
</body>
</html>
