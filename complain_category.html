<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Promee Internet - Complain Category</title>
    <link rel="stylesheet" href="assets/css/style.css?v=20260326f" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div id="app-header"></div>
<div class="main-content">
<div class="page-content">
        <div class="content-header">
          <h1>Complain Category</h1>
          <p>Group and manage different types of support requests</p>
        </div>

        <div class="card">
          <div class="form-section">
            <div class="form-group">
              <label>Add New Category</label>
              <div style="display: flex; gap: 10px">
                <input
                  type="text"
                  placeholder="Category Name"
                  style="flex: 1"
                />
                <button class="btn btn-navy">Add</button>
              </div>
            </div>
          </div>

          <table style="margin-top: 20px">
            <thead>
              <tr>
                <th>Category Name</th>
                <th>Tickets Count</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>Slow Internet</td>
                <td>45</td>
                <td>
                  <i
                    class="fa-solid fa-trash"
                    style="color: #e53935; cursor: pointer"
                  ></i>
                </td>
              </tr>
              <tr>
                <td>Billing Issue</td>
                <td>12</td>
                <td>
                  <i
                    class="fa-solid fa-trash"
                    style="color: #e53935; cursor: pointer"
                  ></i>
                </td>
              </tr>
              <tr>
                <td>Router Config</td>
                <td>8</td>
                <td>
                  <i
                    class="fa-solid fa-trash"
                    style="color: #e53935; cursor: pointer"
                  ></i>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
    <script src="assets/js/header-loader.js?v=20260328i"></script>
  </body>
</html>
